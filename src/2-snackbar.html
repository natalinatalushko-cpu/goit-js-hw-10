<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snackbar</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="page page-snackbar">
    <!-- Шапка сторінки з навігацією -->
    <header class="header">
      <div class="container">
        <nav class="nav">
          <ul class="nav-list">
            <li class="nav-item">
              <a class="nav-link" href="./1-timer.html">Timer</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="./2-snackbar.html">Snackbar</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Основний вміст сторінки -->
    <main class="page-main">
      <div class="container">
        <h1 class="main-title">Snackbar</h1>
        <load src="./partials/back-link.html" />

        <!-- Форма для створення повідомлення -->
        <form class="form" autocomplete="off">
          <label>
            Delay (ms)
            <input type="number" name="delay" min="0" required />
          </label>
          <fieldset class="form-fieldset">
            <legend>State</legend>
            <label class="form-radio">
              <input type="radio" name="state" value="fulfilled" required />
              Fulfilled
            </label>
            <label class="form-radio">
              <input type="radio" name="state" value="rejected" required />
              Rejected
            </label>
          </fieldset>
          <button class="form-btn" type="submit">Create notification</button>
        </form>
      </div>
    </main>

    <!-- Підвал сторінки -->
    <footer class="page-footer">
      <load src="./partials/footer.html" />
    </footer>

    <script type="module" src="./js/2-snackbar.js"></script>
  </body>
</html>
